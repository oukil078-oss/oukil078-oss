name: "Update Snake Contribution Graph"
on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *" # daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push commit
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Generate Snake SVG
        uses: platane/snk@v2
        with:
          github_user_name: ${{ github.actor }}
          svg_out_path: dist/github-contribution-grid-snake.svg
      - name: Commit SVG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ ! -f dist/github-contribution-grid-snake.svg ]; then
            echo "Snake SVG not found!"
            exit 1
          fi
          # Ensure dist folder is tracked
          git add dist/github-contribution-grid-snake.svg
          # Commit only if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "🐍 Update contribution snake graph [skip ci]"
            git push origin HEAD:${{ github.ref }}
          else
            echo "No changes in snake SVG."
          fi