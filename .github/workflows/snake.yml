name: "Update Snake Contribution Graph"
on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * *" # daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push commit
    steps:
      - uses: actions/checkout@v4
      - name: Create dist directory
        run: mkdir -p dist
      - name: Generate Snake SVG
        id: snake
        uses: platane/snk@main
        with:
          github_user_name: ${{ github.actor }}
      - name: Debug outputs
        run: |
          echo "SVG output path: ${{ steps.snake.outputs.svg_out_path }}"
          echo "GIF output path: ${{ steps.snake.outputs.gif_out_path }}"
      - name: List files
        run: |
          ls -la
          ls -la dist/ 2>/dev/null || echo "dist not found"
          if [ -f "${{ steps.snake.outputs.svg_out_path }}" ]; then
            echo "SVG file exists at ${{ steps.snake.outputs.svg_out_path }}"
            ls -la "${{ steps.snake.outputs.svg_out_path }}"
          else
            echo "SVG file does not exist at ${{ steps.snake.outputs.svg_out_path }}"
          fi
      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add dist/
          git diff --quiet && exit 0
          git commit -m "Update snake SVG [skip ci]"
          git push